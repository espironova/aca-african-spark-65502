name: Migrate Vite → Next.js and Deploy
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout code with credentials for push
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # 2️⃣ Check if migration is enabled
      - name: Check if migration is enabled for this repo
        id: check_flag
        run: |
          if [ -f "lovable.migrate.json" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      # 3️⃣ Setup Node.js
      - name: Setup Node.js
        if: steps.check_flag.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 4️⃣ Download migration script
      - name: Download migration script
        if: steps.check_flag.outputs.enabled == 'true'
        run: curl -O https://raw.githubusercontent.com/sergust/lovable-vite-nextjs-migration/main/migrate-to-nextjs.js

      # 5️⃣ Run migration
      - name: Run migration
        if: steps.check_flag.outputs.enabled == 'true'
        run: node migrate-to-nextjs.js

      # 6️⃣ Apply post-migration fixes
      - name: Apply post-migration fixes
        if: steps.check_flag.outputs.enabled == 'true'
        run: |

          # ── Fix A: Disable Turbopack (Next.js 16 default, causes compat issues) ──
          sed -i 's/"next build"/"next build --no-turbo"/' package.json
          sed -i 's/"next dev --turbopack"/"next dev"/' package.json

          # ── Fix B: Add "use client" to any file using hooks but missing the directive ──
          for file in $(grep -rl "useState\|useEffect\|useRef\|useContext\|useNavigate\|useRouter\|useParams\|useSearchParams" src/ --include="*.tsx" --include="*.jsx"); do
            if ! head -1 "$file" | grep -q '"use client"'; then
              # Skip files that are server components (have async default export)
              if ! grep -q "export default async function" "$file"; then
                sed -i '1s/^/"use client";\n/' "$file"
              fi
            fi
          done

          # ── Fix C: Replace react-router-dom Link/hooks with Next.js equivalents ──
          find src -name "*.tsx" -o -name "*.jsx" | xargs sed -i \
            -e "s|import { Link } from 'react-router-dom'|import Link from 'next/link'|g" \
            -e "s|import { useNavigate } from 'react-router-dom'|import { useRouter } from 'next/navigation'|g" \
            -e "s|import { useParams } from 'react-router-dom'|import { useParams } from 'next/navigation'|g" \
            -e "s|import { useSearchParams } from 'react-router-dom'|import { useSearchParams } from 'next/navigation'|g" \
            -e "s|const navigate = useNavigate()|const router = useRouter()|g" \
            -e "s|navigate(|router.push(|g"

          # ── Fix D: Remove leftover BrowserRouter / Routes wrapping ──
          find src -name "*.tsx" -o -name "*.jsx" | xargs sed -i \
            -e "s|import { BrowserRouter.*} from 'react-router-dom'||g" \
            -e "s|import { Routes.*} from 'react-router-dom'||g" \
            -e "s|<BrowserRouter>||g" \
            -e "s|</BrowserRouter>||g"

          # ── Fix E: Ensure next.config.mjs has typescript + eslint build bypass ──
          cat > next.config.mjs << 'EOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            typescript: {
              ignoreBuildErrors: true,  // Remove once TS errors are cleaned up
            },
            eslint: {
              ignoreDuringBuilds: true, // Remove once ESLint errors are cleaned up
            },
            images: {
              remotePatterns: [
                { protocol: 'https', hostname: '**.supabase.co' },
                { protocol: 'https', hostname: 'images.unsplash.com' },
                { protocol: 'https', hostname: '**.lovable.app' },
              ],
            },
            compress: true,
            poweredByHeader: false,
          };
          export default nextConfig;
          EOF

      # 7️⃣ Install dependencies and validate build BEFORE pushing
      - name: Install dependencies
        if: steps.check_flag.outputs.enabled == 'true'
        run: npm install

      - name: Validate Next.js build
        if: steps.check_flag.outputs.enabled == 'true'
        run: npm run build
        env:
          # Pass dummy values so build doesn't fail on missing env vars
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

      # 8️⃣ Configure Git
      - name: Configure Git
        if: steps.check_flag.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 9️⃣ Push to nextjs-deploy branch (only if build passed)
      - name: Push to nextjs-deploy branch
        if: steps.check_flag.outputs.enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Exclude build artifacts from the push
          echo ".next/" >> .gitignore
          echo "node_modules/" >> .gitignore
          git checkout -B nextjs-deploy
          git add -A
          git commit -m "chore: auto-migrate to Next.js [$(date +'%Y-%m-%d %H:%M')]" || echo "No changes to commit"
          git push origin nextjs-deploy --force

      # 🔟 Skip notice if migration not enabled
      - name: Skip notice
        if: steps.check_flag.outputs.enabled == 'false'
        run: echo "⏭️ lovable.migrate.json not found — skipping migration for this repo."
